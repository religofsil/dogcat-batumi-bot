services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: curator
      POSTGRES_DB: curator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator -d curator"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://curator:curator@postgres:5432/curator
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
